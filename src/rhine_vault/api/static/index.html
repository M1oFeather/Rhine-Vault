<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rhine-Vault</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: #f6f7f9;
      color: #1d232b;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid #d9dee7;
      background: #ffffff;
    }
    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 64px);
    }
    nav {
      padding: 16px;
      border-right: 1px solid #d9dee7;
      background: #ffffff;
    }
    button {
      width: 100%;
      margin: 4px 0;
      padding: 9px 10px;
      border: 1px solid #bcc5d2;
      background: #fff;
      border-radius: 6px;
      text-align: left;
      cursor: pointer;
    }
    button:hover { background: #eef3f8; }
    section { padding: 18px 22px; display: none; }
    section.active { display: block; }
    textarea, input, select {
      box-sizing: border-box;
      margin: 6px 0 12px;
      padding: 8px;
      border: 1px solid #bcc5d2;
      border-radius: 6px;
      background: #fff;
    }
    textarea, input, section select { width: 100%; }
    textarea { min-height: 130px; }
    select[multiple] { min-height: 112px; }
    .field-label {
      display: block;
      margin-top: 6px;
      color: #4b5665;
      font-size: 13px;
    }
    .inline-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .message-list {
      display: grid;
      gap: 8px;
      margin: 8px 0 12px;
    }
    .message-item {
      border: 1px solid #d9dee7;
      border-radius: 6px;
      background: #fff;
      padding: 8px 10px;
    }
    .message-role {
      color: #4b5665;
      font-size: 12px;
      margin-bottom: 4px;
    }
    pre {
      white-space: pre-wrap;
      background: #fff;
      border: 1px solid #d9dee7;
      border-radius: 6px;
      padding: 12px;
    }
    .action {
      background: #233043;
      color: #fff;
      border-color: #233043;
      text-align: center;
    }
    .locale-control {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .locale-control select {
      min-width: 112px;
      margin: 0;
    }
  </style>
</head>
<body>
  <header>
    <strong data-i18n="app.title">Rhine-Vault Phase 4</strong>
    <label class="locale-control">
      <span data-i18n="language.label">语言</span>
      <select id="locale-select" onchange="applyLocale(this.value)">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </label>
  </header>
  <main>
    <nav>
      <button onclick="show('manual')" data-i18n="nav.manual">手动节点编辑</button>
      <button onclick="show('conversation')" data-i18n="nav.conversation">对话采集</button>
      <button onclick="show('document')" data-i18n="nav.document">文档导入</button>
      <button onclick="show('project')" data-i18n="nav.project">项目导入</button>
      <button onclick="show('review')" data-i18n="nav.review">候选知识审核</button>
      <button onclick="show('search')" data-i18n="nav.search">搜索实验台</button>
      <button onclick="show('retrieval')" data-i18n="activity.retrieve">检索实验台</button>
      <button onclick="show('context')" data-i18n="nav.context">Context Bundle</button>
      <button onclick="show('llm')" data-i18n="nav.llm">LLM 调试台</button>
      <button onclick="show('mcp'); loadMcpCapabilities()" data-i18n="nav.mcp">MCP 能力</button>
    </nav>
    <div>
      <section id="manual" class="active">
        <h2 data-i18n="manual.title">手动节点编辑</h2>
        <input id="manual-title" data-i18n-placeholder="manual.title.placeholder" placeholder="标题">
        <label class="field-label" for="manual-type" data-i18n="manual.type.label">节点类型</label>
        <select id="manual-type"></select>
        <textarea id="manual-content" data-i18n-placeholder="manual.content.placeholder" placeholder="Markdown 内容"></textarea>
        <button class="action" onclick="manual()" data-i18n="manual.save">保存为候选知识</button>
      </section>
      <section id="conversation">
        <h2 data-i18n="conversation.title">对话采集</h2>
        <label class="field-label" for="conversation-session" data-i18n="conversation.session.label">会话 ID</label>
        <input id="conversation-session" value="ui-session">
        <div class="inline-row">
          <label>
            <span class="field-label" data-i18n="conversation.role.label">角色</span>
            <select id="conversation-role">
              <option value="user" data-i18n="conversation.role.user">用户</option>
              <option value="assistant" data-i18n="conversation.role.assistant">助手</option>
              <option value="system" data-i18n="conversation.role.system">系统</option>
            </select>
          </label>
        </div>
        <textarea id="conversation-message" data-i18n-placeholder="conversation.message.placeholder" placeholder="输入一条对话消息"></textarea>
        <button class="action" onclick="addConversationMessage()" data-i18n="conversation.add">添加消息</button>
        <button onclick="clearConversationMessages()" data-i18n="conversation.clear">清空消息</button>
        <div id="conversation-messages" class="message-list"></div>
        <button class="action" onclick="conversation()" data-i18n="conversation.capture">采集对话</button>
      </section>
      <section id="document">
        <h2 data-i18n="document.title">文档导入</h2>
        <input id="document-path" data-i18n-placeholder="document.path.placeholder" placeholder="Markdown/TXT 文件路径">
        <button class="action" onclick="documentImport()" data-i18n="document.import">导入</button>
      </section>
      <section id="project">
        <h2 data-i18n="project.title">项目导入</h2>
        <input id="project-root" data-i18n-placeholder="project.root.placeholder" placeholder="项目根目录">
        <button class="action" onclick="projectScan()" data-i18n="project.scan">扫描</button>
      </section>
      <section id="review">
        <h2 data-i18n="review.title">候选知识审核</h2>
        <button class="action" onclick="loadProposals()" data-i18n="review.load">加载候选知识</button>
        <label class="field-label" for="review-proposal-select" data-i18n="review.proposal.label">选择 proposal</label>
        <select id="review-proposal-select" onchange="selectProposal()"></select>
        <label class="field-label" for="review-temp-select" data-i18n="review.temp_ids.label">选择候选节点</label>
        <select id="review-temp-select" multiple></select>
        <button class="action" onclick="stageProposal()" data-i18n="review.stage">保存为 staging</button>
        <button class="action" onclick="loadStaging()" data-i18n="review.load_staging">加载 staging</button>
        <label class="field-label" for="review-entry-select" data-i18n="review.entry_ids.label">选择 staging 条目</label>
        <select id="review-entry-select" multiple></select>
        <button class="action" onclick="approveStaging()" data-i18n="review.approve">批准 staging</button>
        <button class="action" onclick="rejectProposal()" data-i18n="review.reject">驳回 proposal</button>
      </section>
      <section id="search">
        <h2 data-i18n="search.title">搜索实验台</h2>
        <input id="search-query" data-i18n-placeholder="search.query.placeholder" placeholder="查询">
        <button class="action" onclick="search()" data-i18n="search.submit">搜索</button>
      </section>
      <section id="retrieval">
        <h2 data-i18n="search.title">Retrieval Lab</h2>
        <label class="field-label" for="retrieval-query" data-i18n="search.query.placeholder">查询</label>
        <input id="retrieval-query" placeholder="查询">
        <div class="inline-row">
          <label>
            <span class="field-label" data-i18n="retrieval.profile.label">检索 Profile</span>
            <select id="retrieval-profile-select"></select>
          </label>
          <label>
            <span class="field-label" data-i18n="retrieval.limit.label">结果数</span>
            <input id="retrieval-result-limit" type="number" min="1" max="30" value="8">
          </label>
        </div>
        <div class="inline-row">
          <label>
            <span class="field-label" data-i18n="retrieval.depth.label">关系深度</span>
            <input id="retrieval-relation-depth" type="number" min="0" max="1" value="1">
          </label>
          <label>
            <span class="field-label" data-i18n="retrieval.tags.label">标签过滤</span>
            <input id="retrieval-tags" data-i18n-placeholder="retrieval.tags.placeholder" placeholder="逗号分隔">
          </label>
        </div>
        <div class="inline-row">
          <label>
            <span class="field-label" data-i18n="retrieval.node_type.label">节点类型过滤</span>
            <input id="retrieval-node-type" placeholder="Constraint / Note">
          </label>
          <label>
            <span class="field-label" data-i18n="retrieval.authority.label">Authority 过滤</span>
            <input id="retrieval-authority" placeholder="canonical / approved">
          </label>
        </div>
        <label class="field-label">
          <input id="retrieval-include-deprecated" type="checkbox">
          <span data-i18n="retrieval.include_deprecated">包含 deprecated 节点</span>
        </label>
        <button class="action" onclick="retrievalLab()" data-i18n="retrieval.run">运行 Retrieval Lab</button>
      </section>
      <section id="context">
        <h2 data-i18n="context.title">Context Bundle 查看器</h2>
        <input id="context-query" data-i18n-placeholder="context.query.placeholder" placeholder="问题">
        <button class="action" onclick="contextBundle()" data-i18n="context.build">构建</button>
      </section>
      <section id="llm">
        <h2 data-i18n="llm.title">LLM 调试台</h2>
        <input id="llm-query" data-i18n-placeholder="llm.query.placeholder" placeholder="问题">
        <button class="action" onclick="fakeLLM()" data-i18n="llm.ask">询问 FakeLLM</button>
      </section>
      <section id="mcp">
        <h2 data-i18n="mcp.title">MCP 能力边界</h2>
        <button class="action" onclick="loadMcpCapabilities()" data-i18n="mcp.load">加载 MCP 能力</button>
        <label class="field-label" for="mcp-tool-select" data-i18n="mcp.tool.label">白名单工具</label>
        <select id="mcp-tool-select"></select>
        <label class="field-label" for="mcp-arguments" data-i18n="mcp.arguments.label">JSON 参数</label>
        <textarea id="mcp-arguments">{"workspace_id":"demo-workspace","query":"approval"}</textarea>
        <button class="action" onclick="callMcpTool()" data-i18n="mcp.call">调用工具</button>
        <label class="field-label" for="mcp-resource-uri" data-i18n="mcp.resource.label">Resource URI</label>
        <input id="mcp-resource-uri" value="rhine://workspace/demo-workspace/schema/memory-node">
        <button class="action" onclick="readMcpResource()" data-i18n="mcp.resource.read">读取 Resource</button>
        <pre id="mcp-summary">MCP capabilities will appear here.</pre>
      </section>
      <pre id="output" data-i18n="output.placeholder">结果会显示在这里。</pre>
    </div>
  </main>
  <script>
    const workspace_id = "demo-workspace";
    const DEFAULT_LOCALE = "zh";
    const SUPPORTED_LOCALES = ["zh", "en"];
    let cachedProposals = [];
    let currentMessages = {};
    let conversationMessages = [];
    let cachedMcpCapabilities = null;

    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll("[data-i18n-default]").forEach((element) => {
        element.addEventListener("input", () => {
          element.dataset.touched = "true";
        });
      });
      const storedLocale = localStorage.getItem("rhine-vault-locale") || DEFAULT_LOCALE;
      applyLocale(storedLocale);
    });

    function normalizeLocale(locale) {
      return SUPPORTED_LOCALES.includes(locale) ? locale : DEFAULT_LOCALE;
    }

    async function applyLocale(locale) {
      const selected = normalizeLocale(locale);
      const response = await fetch(`/api/i18n?locale=${selected}`);
      if (!response.ok) {
        return;
      }
      const catalog = await response.json();
      const messages = catalog.messages;
      currentMessages = messages;
      document.documentElement.lang = catalog.locale === "zh" ? "zh-CN" : "en";
      document.getElementById("locale-select").value = catalog.locale;
      localStorage.setItem("rhine-vault-locale", catalog.locale);

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.dataset.i18n;
        if (messages[key]) {
          element.textContent = messages[key];
        }
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
        const key = element.dataset.i18nPlaceholder;
        if (messages[key]) {
          element.setAttribute("placeholder", messages[key]);
        }
      });
      document.querySelectorAll("[data-i18n-default]").forEach((element) => {
        const key = element.dataset.i18nDefault;
        if (messages[key] && !element.dataset.touched) {
          element.value = messages[key];
        }
      });
      seedConversationMessages();
      renderConversationMessages();
      loadNodeTypes(catalog.locale);
      loadRetrievalProfiles();
    }

    async function loadNodeTypes(locale) {
      const response = await fetch(`/api/node-types?locale=${locale}`);
      if (!response.ok) {
        return;
      }
      const payload = await response.json();
      const select = document.getElementById("manual-type");
      const selectedValue = select.value || "Note";
      select.replaceChildren();
      payload.node_types.forEach((nodeType) => {
        const option = document.createElement("option");
        option.value = nodeType.id;
        option.textContent = nodeType.display_name;
        option.title = nodeType.description;
        select.appendChild(option);
      });
      if (Array.from(select.options).some((option) => option.value === selectedValue)) {
        select.value = selectedValue;
      }
    }

    function show(id) {
      document.querySelectorAll("section").forEach((section) => {
        section.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
    }
    async function post(url, body) {
      const res = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
      });
      out(await res.json());
    }
    function out(value) {
      document.getElementById("output").textContent = JSON.stringify(value, null, 2);
    }
    function manual() {
      if (!val("manual-title").trim()) {
        out({error: currentMessage("manual.title.required")});
        return;
      }
      post("/api/manual", {
        workspace_id,
        title: val("manual-title"),
        node_type: val("manual-type"),
        content: val("manual-content")
      });
    }
    function seedConversationMessages() {
      if (conversationMessages.length > 0 || !currentMessages["conversation.seed.user"]) {
        return;
      }
      conversationMessages = [
        {
          message_id: "m1",
          role: "user",
          content: currentMessages["conversation.seed.user"]
        },
        {
          message_id: "m2",
          role: "assistant",
          content: currentMessages["conversation.seed.assistant"]
        }
      ];
    }
    function addConversationMessage() {
      const content = val("conversation-message").trim();
      if (!content) {
        return;
      }
      conversationMessages.push({
        message_id: `m${conversationMessages.length + 1}`,
        role: val("conversation-role"),
        content
      });
      document.getElementById("conversation-message").value = "";
      renderConversationMessages();
    }
    function clearConversationMessages() {
      conversationMessages = [];
      renderConversationMessages();
    }
    function renderConversationMessages() {
      const container = document.getElementById("conversation-messages");
      container.replaceChildren();
      conversationMessages.forEach((message) => {
        const item = document.createElement("div");
        item.className = "message-item";
        const role = document.createElement("div");
        role.className = "message-role";
        role.textContent = `${message.message_id} · ${message.role}`;
        const content = document.createElement("div");
        content.textContent = message.content;
        item.append(role, content);
        container.appendChild(item);
      });
    }
    function conversation() {
      if (conversationMessages.length === 0) {
        out({error: currentMessage("conversation.empty")});
        return;
      }
      post("/api/conversations/capture", {
        workspace_id,
        session_id: val("conversation-session") || "ui-session",
        messages: conversationMessages
      });
    }
    function documentImport() {
      post("/api/documents/import", {workspace_id, path: val("document-path")});
    }
    function projectScan() {
      post("/api/projects/scan", {workspace_id, root: val("project-root")});
    }
    async function loadProposals() {
      const res = await fetch(`/api/proposals?workspace_id=${workspace_id}`);
      const proposals = await res.json();
      cachedProposals = proposals;
      populateProposalOptions(proposals);
      out(proposals);
    }
    function stageProposal() {
      const proposalId = val("review-proposal-select");
      post(`/api/proposals/${proposalId}/stage`, {
        workspace_id,
        temporary_ids: selectedValues("review-temp-select")
      });
    }
    async function loadStaging() {
      const res = await fetch(`/api/staging?workspace_id=${workspace_id}`);
      const entries = await res.json();
      populateStagingOptions(entries);
      out(entries);
    }
    function approveStaging() {
      post("/api/staging/approve", {
        workspace_id,
        entry_ids: selectedValues("review-entry-select")
      });
    }
    function rejectProposal() {
      post(`/api/proposals/${val("review-proposal-select")}/reject`, {workspace_id});
    }
    function search() {
      post("/api/search", {workspace_id, query: val("search-query")});
    }
    async function loadRetrievalProfiles() {
      const select = document.getElementById("retrieval-profile-select");
      if (!select) {
        return;
      }
      const response = await fetch(`/api/retrieval/profiles?workspace_id=${workspace_id}`);
      if (!response.ok) {
        return;
      }
      const payload = await response.json();
      const selectedValue = select.value || payload.default_profile_id;
      select.replaceChildren();
      payload.profiles.forEach((profile) => {
        const option = document.createElement("option");
        option.value = profile.profile_id;
        option.textContent = profile.name;
        select.appendChild(option);
      });
      select.value = selectedValue;
    }
    function retrievalLab() {
      post("/api/retrieval/lab", {
        workspace_id,
        query: val("retrieval-query"),
        profile_id: val("retrieval-profile-select"),
        result_limit: Number(val("retrieval-result-limit") || 8),
        relation_depth: Number(val("retrieval-relation-depth") || 0),
        node_type: val("retrieval-node-type") || null,
        authority: val("retrieval-authority") || null,
        tags: splitIds("retrieval-tags"),
        include_deprecated: document.getElementById("retrieval-include-deprecated").checked
      });
    }
    function contextBundle() {
      post("/api/context", {workspace_id, query: val("context-query")});
    }
    function fakeLLM() {
      post("/api/llm/fake", {workspace_id, query: val("llm-query")});
    }
    async function loadMcpCapabilities() {
      const res = await fetch("/api/mcp/capabilities");
      const payload = await res.json();
      cachedMcpCapabilities = payload;
      populateMcpTools(payload.tools || []);
      document.getElementById("mcp-summary").textContent = JSON.stringify({
        phase: payload.phase,
        streamable_http: payload.streamable_http,
        tools: (payload.tools || []).map((tool) => `${tool.name} (${tool.write_scope})`),
        forbidden_tools: payload.forbidden_tools,
        resources: payload.resources,
        approval_policy: payload.approval_policy
      }, null, 2);
      out(payload);
    }
    async function callMcpTool() {
      let parsed = {};
      try {
        parsed = JSON.parse(val("mcp-arguments") || "{}");
      } catch (error) {
        out({error: String(error)});
        return;
      }
      await post(`/api/mcp/tools/${val("mcp-tool-select")}`, {arguments: parsed});
    }
    async function readMcpResource() {
      const uri = encodeURIComponent(val("mcp-resource-uri"));
      const res = await fetch(`/api/mcp/resources?uri=${uri}`);
      out(await res.json());
    }
    function val(id) {
      return document.getElementById(id).value;
    }
    function currentMessage(key) {
      return currentMessages[key] || key;
    }
    function splitIds(id) {
      return val(id).split(",").map((item) => item.trim()).filter(Boolean);
    }
    function selectedValues(id) {
      return Array.from(document.getElementById(id).selectedOptions).map((option) => option.value);
    }
    function populateProposalOptions(proposals) {
      const select = document.getElementById("review-proposal-select");
      select.replaceChildren();
      proposals.forEach((proposal) => {
        const option = document.createElement("option");
        option.value = proposal.proposal_id;
        option.textContent = `${proposal.status} · ${proposal.proposed_nodes.length} nodes · ${proposal.proposal_id}`;
        select.appendChild(option);
      });
      selectProposal();
    }
    function selectProposal() {
      const proposalId = val("review-proposal-select");
      const proposal = cachedProposals.find((item) => item.proposal_id === proposalId);
      const select = document.getElementById("review-temp-select");
      select.replaceChildren();
      if (!proposal) {
        return;
      }
      proposal.proposed_nodes.forEach((node) => {
        const option = document.createElement("option");
        option.value = node.temporary_id;
        option.textContent = `${node.node_type} · ${node.title}`;
        option.selected = true;
        select.appendChild(option);
      });
    }
    function populateStagingOptions(entries) {
      const select = document.getElementById("review-entry-select");
      select.replaceChildren();
      entries.forEach((entry) => {
        const option = document.createElement("option");
        option.value = entry.entry_id;
        option.textContent = `${entry.status} · ${entry.proposed_node.title}`;
        option.selected = true;
        select.appendChild(option);
      });
    }
    function populateMcpTools(tools) {
      const select = document.getElementById("mcp-tool-select");
      select.replaceChildren();
      tools.forEach((tool) => {
        const option = document.createElement("option");
        option.value = tool.name;
        option.textContent = `${tool.name} · ${tool.write_scope}`;
        select.appendChild(option);
      });
      if (!select.value && select.options.length > 0) {
        select.value = select.options[0].value;
      }
    }
  </script>
</body>
</html>
