site_name: Rhine-Vault
site_description: Local-first knowledge capture, approval and retrieval infrastructure.
repo_name: Rhine-Vault
docs_dir: docs
site_dir: site

theme:
  name: mkdocs
  language: zh

exclude_docs: |
  local/
  local/**
  discussion/
  discussion/**
  templates/
  templates/**
  implementation/CHANGELOG_PENDING.md

