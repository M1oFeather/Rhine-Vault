      - Architecture Contract: architecture/ARCHITECTURE_CONTRACT.md
      - Decision Log: architecture/DECISION_LOG.md
      - V1 Scope: architecture/V1_SCOPE.md
      - Scope Matrix: architecture/SCOPE_MATRIX.md
      - Product Layers: architecture/PRODUCT_LAYERS.md
      - Domain Model: architecture/DOMAIN_MODEL.md
      - Knowledge Capture: architecture/KNOWLEDGE_CAPTURE.md
      - Actor Permission Model: architecture/ACTOR_PERMISSION_MODEL.md
      - API and MCP Contract: architecture/API_MCP_CONTRACT.md
      - Storage and Indexing: architecture/STORAGE_AND_INDEXING.md
      - Schema and Migration: architecture/SCHEMA_AND_MIGRATION.md
      - Chunking Spec: architecture/CHUNKING_SPEC.md
      - Retrieval Profiles: architecture/RETRIEVAL_PROFILES.md
      - Ranking and Reranking: architecture/RANKING_AND_RERANKING.md
      - Context Bundle: architecture/CONTEXT_BUNDLE.md
      - Relation Consistency: architecture/RELATION_CONSISTENCY.md
      - Versioning and Git: architecture/VERSIONING_AND_GIT.md
