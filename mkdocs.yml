      - Roadmap: implementation/ROADMAP.md
      - Phase 0-1 Checklist: implementation/PHASE_0_1_CHECKLIST.md
      - Phase 1.5 Vertical Slice: implementation/PHASE_1_5_VERTICAL_SLICE.md
      - Phase 2 Formal Workflow: implementation/PHASE_2_FORMAL_WORKFLOW.md
      - Phase 3 Formal Retrieval: implementation/PHASE_3_FORMAL_RETRIEVAL.md
